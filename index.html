<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle">Toggle Theme</button>
    <h1>Lotto Number Generator</h1>
    <p>Click the button to generate your lucky numbers!</p>
    <button id="generator-btn">Generate Numbers</button>
    <div id="lotto-numbers"></div>
  </div>

  <div class="container" id="contact-form">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/xeerpowk" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" id="submit-btn">Send</button>
    </form>
  </div>

  <script defer type="text/javascript" src="/data.js"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
