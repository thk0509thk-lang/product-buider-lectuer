<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동물상 테스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <a href="/" class="back-button">메인으로 돌아가기</a>
    <h1>동물상 테스트</h1>
    <p>당신은 강아지상일까요, 고양이상일까요?</p>
    <label for="image-upload" class="upload-label">이미지 선택</label>
    <input type="file" id="image-upload" accept="image/*" onchange="previewAndPredict(event)">
    <div id="image-container" style="margin-top: 20px;"></div>
    <div id="label-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script type="text/javascript">
    const URL = "./my_model/";
    let model, labelContainer, maxPredictions;

    const classTranslations = {
      "Dog": "강아지",
      "Cat": "고양이"
    };

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();
        labelContainer = document.getElementById("label-container");
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function previewAndPredict(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                const imageContainer = document.getElementById("image-container");
                imageContainer.innerHTML = ''; // Clear previous image
                const img = document.createElement("img");
                img.src = e.target.result;
                img.style.width = "200px";
                img.style.height = "200px";
                imageContainer.appendChild(img);
                
                await predict(img);
            };
            reader.readAsDataURL(file);
        }
    }

    async function predict(imageElement) {
        const prediction = await model.predict(imageElement);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const translatedName = classTranslations[className] || className;
            const classPrediction =
                `${translatedName}: ${prediction[i].probability.toFixed(2)}`;
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }

    init();
  </script>
</body>
</html>
