<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동물상 테스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <a href="/" class="back-button">메인으로 돌아가기</a>
    <h1>동물상 테스트</h1>
    <p>당신은 강아지상일까요, 고양이상일까요?</p>
    <label for="image-upload" class="upload-label">AI 모델 로딩 중...</label>
    <input type="file" id="image-upload" accept="image/*" disabled>
    <div id="image-container" style="margin-top: 20px;"></div>
    <div id="loading-message"></div>
    <div id="label-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script type="text/javascript">
    const URL = "./my_model/";
    const classTranslations = {
      "Dog": "강아지",
      "Cat": "고양이"
    };

    async function init() {
        const uploadInput = document.getElementById("image-upload");
        const uploadLabel = document.querySelector(".upload-label");
        const loadingMessage = document.getElementById("loading-message");
        const imageContainer = document.getElementById("image-container");
        const labelContainer = document.getElementById("label-container");
        
        let model, maxPredictions;

        async function previewAndPredict(event) {
            const file = event.target.files[0];
            if (file) {
                imageContainer.innerHTML = '';
                labelContainer.innerHTML = "분석 중...";

                const reader = new FileReader();
                reader.onload = async function(e) {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.style.width = "200px";
                    img.style.height = "200px";
                    imageContainer.appendChild(img);
                    
                    await predict(img);
                };
                reader.readAsDataURL(file);
            }
        }

        async function predict(imageElement) {
            try {
                const prediction = await model.predict(imageElement);
                labelContainer.innerHTML = "";

                prediction.sort((a, b) => b.probability - a.probability);

                const resultHeader = document.createElement('div');
                resultHeader.id = 'result-header';
                const dominantClass = classTranslations[prediction[0].className] || prediction[0].className;
                resultHeader.innerText = `결과: 당신은 ${dominantClass}상입니다!`;
                labelContainer.appendChild(resultHeader);

                for (let i = 0; i < maxPredictions; i++) {
                    const className = prediction[i].className;
                    const translatedName = classTranslations[className] || className;
                    const probability = prediction[i].probability;

                    const container = document.createElement('div');
                    container.classList.add('result-bar-container');

                    const label = document.createElement('div');
                    label.classList.add('result-label');
                    label.innerText = translatedName;

                    const barContainer = document.createElement('div');
                    barContainer.classList.add('progress-bar');
                    
                    const progress = document.createElement('div');
                    progress.classList.add('progress');
                    progress.style.width = `${Math.round(probability * 100)}%`;
                    progress.innerText = `${Math.round(probability * 100)}%`;

                    barContainer.appendChild(progress);
                    container.appendChild(label);
                    container.appendChild(barContainer);
                    labelContainer.appendChild(container);
                }
            } catch (error) {
                console.error("Prediction error:", error);
                labelContainer.innerHTML = "분석에 실패했습니다. 다른 사진으로 시도해주세요.";
            }
        }

        loadingMessage.innerHTML = "AI 모델을 로딩 중입니다...";
        uploadLabel.style.display = 'block';
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        try {
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            
            uploadInput.disabled = false;
            uploadLabel.innerText = "이미지 선택";
            uploadLabel.style.cursor = "pointer";
            loadingMessage.innerHTML = "";
            uploadInput.addEventListener("change", previewAndPredict);

        } catch (error) {
            console.error("Error loading model:", error);
            loadingMessage.innerHTML = "모델을 로드하는 데 실패했습니다. 페이지를 새로고침 해주세요.";
            uploadLabel.style.display = 'none';
        }
    }

    init();
  </script>
</body>
</html>
