<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle">테마 변경</button>
    <h1>로또 번호 생성기</h1>
    <p>버튼을 눌러 행운의 번호를 받아보세요!</p>
    <button id="generator-btn">번호 생성</button>
    <div id="lotto-numbers"></div>
  </div>

  <div class="container">
    <h2>동물상 테스트</h2>
    <p>당신은 강아지상일까요, 고양이상일까요?</p>
    <a href="/animal.html" class="button">테스트 시작</a>
  </div>

  <div class="container" id="contact-form">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/xeerpowk" method="POST">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">메시지</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" id="submit-btn">전송</button>
    </form>
  </div>

  <div class="container">
    <h2>댓글</h2>
    <div id="disqus_thread"></div>
